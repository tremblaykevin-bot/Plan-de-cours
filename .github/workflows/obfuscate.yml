name: Obfusquer et publier

on:
  push:
    paths:
      - 'index_source.html'   # se déclenche seulement quand tu modifies ce fichier

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Installer javascript-obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfusquer le JS
        run: |
          python3 - << 'EOF'
          import re, subprocess, tempfile, os

          html = open('index_source.html', 'r', encoding='utf-8').read()
          script_pattern = re.compile(r'(<script(?![^>]*\bsrc\b)[^>]*>)(.*?)(</script>)', re.DOTALL)

          def obfuscate_js(code, idx):
              code = code.strip()
              if not code or len(code) < 50:
                  return code
              with tempfile.NamedTemporaryFile(suffix='.js', mode='w', encoding='utf-8', delete=False) as f:
                  f.write(code)
                  fname = f.name
              out = fname.replace('.js', '_obf.js')
              result = subprocess.run([
                  'javascript-obfuscator', fname, '--output', out,
                  '--compact', 'true',
                  '--self-defending', 'false',
                  '--identifier-names-generator', 'hexadecimal',
                  '--rename-globals', 'false',
                  '--string-array', 'true',
                  '--string-array-encoding', 'base64',
                  '--string-array-threshold', '0.5',
                  '--string-array-rotate', 'true',
                  '--string-array-shuffle', 'true',
                  '--string-array-index-shift', 'true',
                  '--split-strings', 'false',
                  '--numbers-to-expressions', 'false',
                  '--transform-object-keys', 'false',
                  '--dead-code-injection', 'false',
              ], capture_output=True, text=True)
              os.unlink(fname)
              if result.returncode != 0 or not os.path.exists(out):
                  print(f"Bloc {idx}: erreur — conservé tel quel\n{result.stderr[:300]}")
                  return code
              obf = open(out, 'r', encoding='utf-8').read()
              os.unlink(out)
              print(f"Bloc {idx}: {len(code):,} → {len(obf):,} chars")
              return obf

          matches = list(script_pattern.finditer(html))
          print(f"{len(matches)} blocs <script> trouvés")
          parts = []
          last = 0
          for i, m in enumerate(matches):
              parts.append(html[last:m.start()])
              obf = obfuscate_js(m.group(2), i + 1)
              parts.append(m.group(1) + '\n' + obf + '\n' + m.group(3))
              last = m.end()
          parts.append(html[last:])
          open('index.html', 'w', encoding='utf-8').write(''.join(parts))
          print("✅ index.html généré")
          EOF

      - name: Publier index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "🔒 Build obfusqué automatique"
          git push
